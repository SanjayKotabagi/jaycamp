server {
    listen 80;
    server_name _;

    root /home/pi/portal;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    # Kiwix search API
    location /search {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    location /viewer {
        proxy_pass http://127.0.0.1:8080;
    }

    # ── ADD A LOCATION BLOCK FOR EACH ZIM YOU INSTALL ──
    # The path must match the ZIM filename (without .zim extension)
    # Example:
    # location /wikipedia_en_top_maxi_2025-12 {
    #     proxy_pass http://127.0.0.1:8080;
    # }
}

server {
    listen 81;
    server_name _;

    root /home/pi/portal;
    index files.html;

    location = / {
        try_files /files.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
